name: binance_dw
version: "1.0.0"
config-version: 2

profile: binance

model-paths: ["models"]
test-paths:  ["tests"]
seed-paths:  ["seeds"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  binance_dw:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: view
      +schema: public
      mart_spread_by_session:
        +materialized: table
        +post_hook: "ANALYZE {{ this }}"
      mart_daily_performance:
        +materialized: table
        +post_hook: "ANALYZE {{ this }}"
